<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6 col-xl-5">
      <div class="card shadow border-0 rounded-3">
        <div class="card-body p-4 p-md-5">
          <h2 class="card-title text-center mb-3">{{ 'app.auth.passwordReset.title' | transloco }}</h2>
          <p class="text-muted text-center mb-4">{{ 'app.auth.passwordReset.description' | transloco }}</p>

          @if (successMessage()) {
            <div class="alert alert-success" data-cy="success-message">
              {{ successMessage() }}
            </div>
          }

          @if (resetAction.error()) {
            <div class="alert alert-danger" data-cy="error-message">
              {{ resetAction.error() }}
            </div>
          }

          <form (submit)="$event.preventDefault(); onSubmit()" novalidate>
            <app-form-input
              [formField]="resetForm.username"
              [submitted]="submitted()"
              id="username"
              label="app.auth.passwordReset.username"
              placeholder="app.auth.passwordReset.username"
              data-cy="username-input">
            </app-form-input>

            <div class="d-grid gap-2 mb-3">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="!resetForm().valid() || resetAction.loading()"
                data-cy="reset-request-button">
                @if (resetAction.loading()) {
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                }
                @if (!resetAction.loading()) {
                  <span>{{ 'app.auth.passwordReset.sendResetLink' | transloco }}</span>
                }
              </button>
            </div>

            <div class="text-center">
              <button
                type="button"
                class="btn btn-link text-decoration-none"
                (click)="navigateToLogin()"
                data-cy="back-to-login">
                {{ 'app.auth.passwordReset.backToLogin' | transloco }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
